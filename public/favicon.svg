<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Twój firmowy neonowy gradient -->
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f3ff" />
      <stop offset="100%" stop-color="#b500ff" />
    </linearGradient>
  </defs>

  <!-- Ciemne tło (zaokrąglony kwadrat) -->
  <rect width="100" height="100" rx="25" fill="#0f172a" />

  <!-- Kartka papieru (Symbol Testu/Quizu) -->
  <rect x="25" y="20" width="50" height="60" rx="8" fill="none" stroke="url(#neonGradient)" stroke-width="8" />

  <!-- Poprawna odpowiedź / Zaznaczenie (Checkmark) -->
  <path d="M 37 50 L 45 58 L 63 35" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Duża magiczna iskra AI (prawy dolny róg) -->
  <path d="M 75 60 Q 75 75 90 75 Q 75 75 75 90 Q 75 75 60 75 Q 75 75 75 60 Z" fill="#00f3ff" />
  
  <!-- Mała magiczna iskra AI (lewy górny róg) -->
  <path d="M 15 10 Q 15 20 25 20 Q 15 20 15 30 Q 15 20 5 20 Q 15 20 15 10 Z" fill="#b500ff" />
</svg>
